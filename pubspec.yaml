name: handi_roti_app
description: Handi Roti Ordering Application
publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ">=3.5.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  http: ^1.2.2
  cupertino_icons: ^1.0.8
  firebase_core: ^3.0.0
  firebase_auth: ^5.0.0
  firebase_analytics: ^11.0.0
  audioplayers: ^6.1.0
  dio: ^5.7.0
  flutter_riverpod: ^2.5.1
  go_router: ^14.2.7
  shared_preferences: ^2.3.2
  intl: ^0.19.0
  cached_network_image: ^3.4.1
  shimmer: ^3.0.0
  image_picker: ^1.2.1
  firebase_messaging: ^15.2.10
  flutter_local_notifications: ^17.2.1
  share_plus: ^10.0.2
  path_provider: ^2.1.4
  flutter_native_splash: ^2.4.7
  flutter_launcher_icons: ^0.14.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/sounds/order_ring.mp3
    - assets/branding/handiroti_logo.png
    - assets/branding/handiroti_scooter.png
    - assets/branding/handiroti_applogo.png

flutter_native_splash:
  color: "#0B132B"
  image: assets/branding/handiroti_applogo.png
  android: true
  ios: true

  android_12:
    image: assets/branding/handiroti_applogo.png
    color: "#0B132B"

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/branding/handiroti_appleapplogo.png"
  adaptive_icon_background: "#0B132B"
  adaptive_icon_foreground: "assets/branding/handiroti_appleapplogo.png"
  remove_alpha_ios: true
